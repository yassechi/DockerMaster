services:

  web:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./web:/usr/share/nginx/html
    networks:
      - front-net


  api:
    build: 
      context: ./api
    ports:
      - "3001:3001"
      
    # environment:
     # Load secrets

    depends_on:
      - db
    networks:
      - front-net
      - back-net


  db:
    image: postgres:alpine
    ports:
      - "5432:5432"
    volumes:
      - mydata:/var/lib/postgresql
      - ./db/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_USER=yass
      - POSTGRES_PASSWORD=root
      - POSTGRES_DB=tajinedb
    networks:
      - back-net

volumes:
  mydata:

networks:
  front-net:
  back-net:

secrets:
  db_password:
    file: ./secrets/db_password.txt




